<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Syncnote-alpha</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Syncnote-alpha</h1>
      <p class="subtitle">Turn meeting notes into summaries, action items, and email drafts.</p>

      <section class="card">
        <label for="notesInput">Meeting Notes</label>
        <textarea id="notesInput" placeholder="Paste your meeting notes here..."></textarea>
        <button id="analyzeBtn">Analyze Notes</button>
      </section>

      <section id="output" class="card hidden">
        <h2>Summary</h2>
        <p id="summaryText"></p>

        <h2>Action Items</h2>
        <ul id="actionItems"></ul>

        <h2>Email Draft</h2>
        <pre id="emailDraft"></pre>
      </section>

      <p id="status" class="status"></p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
